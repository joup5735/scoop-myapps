name: Update manifest

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download official checkver.ps1
        run: |
          Invoke-WebRequest -Uri https://raw.githubusercontent.com/ScoopInstaller/Scoop/master/bin/checkver.ps1 -OutFile checkver.ps1

      - name: Run checkver on manifest
        run: |
          pwsh ./checkver.ps1 "$PWD/bucket/cryptomator.json" -Update

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/cryptomator.json
          git commit -m "Update manifest" || echo "No changes to commit"
          git push
