name: Update Cryptomator manifest

on:
  schedule:
    - cron: '0 0 * * *'   # 每天运行一次
  workflow_dispatch:      # 手动触发

jobs:
  update:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Scoop
        run: |
          iwr -useb get.scoop.sh | iex
          scoop install git

      - name: Run checkver
        run: |
          $scoopBin = "$env:USERPROFILE\scoop\apps\scoop\current\bin\checkver.ps1"
          & $scoopBin "$PWD\bucket\cryptomator.json" -u

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add bucket/cryptomator.json
          git commit -m "Update Cryptomator manifest"
          git push
