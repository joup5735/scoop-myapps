name: Update Cryptomator manifest

on:
  schedule:
    - cron: '0 0 * * *'   # 每天运行一次
  workflow_dispatch:      # 手动触发

permissions:
  contents: write   # 这里声明允许写入仓库内容

jobs:
  update:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Scoop
        run: |
          iwr -useb get.scoop.sh | iex
          scoop install git

      - name: Run checkver
        run: |
          $scoopBin = "$env:USERPROFILE\scoop\apps\scoop\current\bin\checkver.ps1"
          & $scoopBin "$PWD\bucket\cryptomator.json" -u

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/cryptomator.json
          git commit -m "Update Cryptomator manifest" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
